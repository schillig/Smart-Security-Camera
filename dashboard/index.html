<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ESP32 Camera Evaluation</title>
    <style>
        body { font-family: Arial; background: #1e1e1e; color: white; display: flex; padding: 20px; }
        .controls { width: 350px; background: #2a2a2a; padding: 20px; border-radius: 8px; margin-right: 20px; overflow-y: auto; max-height: 90vh; }
        .video-container { flex-grow: 1; background: #000; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
        h2 { margin-top: 0; border-bottom: 1px solid #444; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center;}
        #status-indicator { font-size: 12px; color: #888; font-weight: normal; transition: color 0.2s; }
        .control-group { margin-bottom: 18px; }
        label { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; color: #ccc;}
        .val-display { color: #4CAF50; font-weight: bold; }
        input[type=range] { width: 100%; cursor: pointer; }
        select { width: 100%; padding: 6px; background: #444; color: white; border: 1px solid #555; border-radius: 4px; cursor: pointer;}
        iframe { width: 100%; height: 100%; flex-grow: 1; border: none; min-height: 600px; }
        .btn-capture { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 15px;}
        .btn-capture:hover { background: #0056b3; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Tuning <span id="status-indicator">Live</span></h2>
        
        <button class="btn-capture" onclick="takeSnapshot()">📸 Take Snapshot</button>

        <div class="control-group">
            <label>Resolution <span id="val_framesize" class="val-display">VGA</span></label>
            <select id="framesize" onchange="document.getElementById('val_framesize').innerText = this.options[this.selectedIndex].text; updateCam('framesize', this.value)">
                <option value="5">QVGA (320x240)</option>
                <option value="8" selected>VGA (640x480)</option>
                <option value="9">SVGA (800x600)</option>
                <option value="10">XGA (1024x768)</option>
                <option value="11">HD (1280x720)</option>
            </select>
        </div>

        <div class="control-group">
            <label>JPEG Quality <span id="val_quality" class="val-display">15</span></label>
            <input type="range" min="10" max="63" value="15" 
                   oninput="document.getElementById('val_quality').innerText = this.value" 
                   onchange="updateCam('quality', this.value)">
        </div>

        <div class="control-group">
            <label>Brightness <span id="val_brightness" class="val-display">0</span></label>
            <input type="range" min="-2" max="2" value="0" 
                   oninput="document.getElementById('val_brightness').innerText = this.value" 
                   onchange="updateCam('brightness', this.value)">
        </div>

        <div class="control-group">
            <label>Contrast <span id="val_contrast" class="val-display">0</span></label>
            <input type="range" min="-2" max="2" value="0" 
                   oninput="document.getElementById('val_contrast').innerText = this.value" 
                   onchange="updateCam('contrast', this.value)">
        </div>

        <div class="control-group">
            <label>Saturation <span id="val_saturation" class="val-display">0</span></label>
            <input type="range" min="-2" max="2" value="0" 
                   oninput="document.getElementById('val_saturation').innerText = this.value" 
                   onchange="updateCam('saturation', this.value)">
        </div>

        <div class="control-group">
            <label>Auto White Balance <span id="val_awb" class="val-display">On</span></label>
            <select onchange="document.getElementById('val_awb').innerText = this.options[this.selectedIndex].text; updateCam('awb', this.value)">
                <option value="1" selected>On</option>
                <option value="0">Off</option>
            </select>
        </div>

        <div class="control-group">
            <label>Invert Vertical <span id="val_vflip" class="val-display">Off</span></label>
            <select onchange="document.getElementById('val_vflip').innerText = this.options[this.selectedIndex].text; updateCam('vflip', this.value)">
                <option value="0" selected>Off</option>
                <option value="1">On</option>
            </select>
        </div>

        <div class="control-group">
            <label>Mirror Horizontal <span id="val_hmirror" class="val-display">Off</span></label>
            <select onchange="document.getElementById('val_hmirror').innerText = this.options[this.selectedIndex].text; updateCam('hmirror', this.value)">
                <option value="0" selected>Off</option>
                <option value="1">On</option>
            </select>
        </div>
    </div>

    <div class="video-container">
        <iframe src="http://127.0.0.1:1985/stream.html?src=front_door_cam"></iframe>
    </div>

    <script>
function updateCam(variable, value) {
            // We added &_t=timestamp to trick the browser into never caching the command
            const url = `http://192.168.50.152/control?var=${variable}&val=${value}&_t=${new Date().getTime()}`;
            
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    const status = document.getElementById('status-indicator');
                    status.innerText = "Updated!";
                    status.style.color = "#4CAF50"; 
                    setTimeout(() => { 
                        status.innerText = "Live"; 
                        status.style.color = "#888"; 
                    }, 1000);
                })
                .catch(error => console.error('Error:', error));
        }
        function takeSnapshot() {
            const a = document.createElement('a');
            a.href = 'http://127.0.0.1:1985/api/frame.jpeg?src=front_door_cam';
            a.download = `cam_snapshot_${new Date().getTime()}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
