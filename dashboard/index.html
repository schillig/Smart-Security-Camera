<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Security Camera Dashboard</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }
        .video-panel {
            flex: 2;
            background: #111;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        .video-panel img {
            width: 100%;
            border-radius: 4px;
            background: #000;
        }
        .controls-panel {
            flex: 1;
            background: #111;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 300px;
        }
        h2 {
            margin-top: 0;
            color: #FF9800;
            font-size: 1.2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #ccc;
        }
        .val-display {
            float: right;
            color: #FF9800;
            font-weight: bold;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        select {
            width: 100%;
            padding: 5px;
            background: #222;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }
        .ota-box {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border: 1px solid #FF9800;
        }
        .ota-btn {
            width: 100%;
            padding: 10px;
            background: #FF9800;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .ota-btn:hover {
            background: #e68a00;
        }
        .ota-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #ota-progress {
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
        #status-indicator {
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="video-panel">
            <h2>Live Feed <span id="status-indicator">Live</span></h2>
            <img id="stream" src="http://192.168.50.23:1985/api/stream.mjpeg?src=front_door_cam" alt="Camera Stream">
        </div>

        <div class="controls-panel">
            
            <div class="ota-box">
                <label style="color: #FF9800; font-weight: bold; margin-bottom: 8px;">Over-The-Air Update</label>
                <input type="file" id="otafile" accept=".bin" style="width: 100%; margin-bottom: 10px; font-size: 12px;">
                <button onclick="pushOTA()" id="otaBtn" class="ota-btn">Push Firmware</button>
                <div id="ota-progress">Uploading... Please wait.</div>
            </div>

            <h2>Tuning Controls</h2>

            <div class="control-group">
                <label>Resolution <span id="val_framesize" class="val-display">VGA</span></label>
                <select id="framesize" onchange="document.getElementById('val_framesize').innerText = this.options[this.selectedIndex].text; updateCam('framesize', this.value)">
                    <option value="5">QVGA (320x240)</option>
                    <option value="6">CIF (400x296)</option>
                    <option value="8" selected>VGA (640x480)</option>
                    <option value="9">SVGA (800x600)</option>
                    <option value="10">XGA (1024x768)</option>
                    <option value="11">HD (1280x720) - 720p</option>
                    <option value="12">SXGA (1280x1024) - 1.3MP</option>
                    <option value="13">UXGA (1600x1200) - 2MP</option>
                    <option value="14">FHD (1920x1080) - 1080p</option>
                    <option value="17">QXGA (2048x1536) - 3MP</option>
                    <option value="21">QSXGA (2560x1920) - 5MP</option>
                </select>
            </div>

            <div class="control-group">
                <label>JPEG Quality (Lower is better) <span id="val_quality" class="val-display">15</span></label>
                <input type="range" id="quality" min="4" max="63" value="15" onchange="document.getElementById('val_quality').innerText = this.value; updateCam('quality', this.value)">
            </div>

            <div class="control-group">
                <label>Brightness <span id="val_brightness" class="val-display">0</span></label>
                <input type="range" id="brightness" min="-2" max="2" value="0" onchange="document.getElementById('val_brightness').innerText = this.value; updateCam('brightness', this.value)">
            </div>

            <div class="control-group">
                <label>Contrast <span id="val_contrast" class="val-display">0</span></label>
                <input type="range" id="contrast" min="-2" max="2" value="0" onchange="document.getElementById('val_contrast').innerText = this.value; updateCam('contrast', this.value)">
            </div>

            <div class="control-group">
                <label>Saturation <span id="val_saturation" class="val-display">0</span></label>
                <input type="range" id="saturation" min="-2" max="2" value="0" onchange="document.getElementById('val_saturation').innerText = this.value; updateCam('saturation', this.value)">
            </div>

            <div class="control-group">
                <label>Vertical Flip <span id="val_vflip" class="val-display">Off</span></label>
                <select id="vflip" onchange="document.getElementById('val_vflip').innerText = this.options[this.selectedIndex].text; updateCam('vflip', this.value)">
                    <option value="0" selected>Off</option>
                    <option value="1">On</option>
                </select>
            </div>

            <div class="control-group">
                <label>Horizontal Mirror <span id="val_hmirror" class="val-display">Off</span></label>
                <select id="hmirror" onchange="document.getElementById('val_hmirror').innerText = this.options[this.selectedIndex].text; updateCam('hmirror', this.value)">
                    <option value="0" selected>Off</option>
                    <option value="1">On</option>
                </select>
            </div>

            <div class="control-group">
                <label>Auto White Balance (AWB) <span id="val_awb" class="val-display">On</span></label>
                <select id="awb" onchange="document.getElementById('val_awb').innerText = this.options[this.selectedIndex].text; updateCam('awb', this.value)">
                    <option value="0">Off</option>
                    <option value="1" selected>On</option>
                </select>
            </div>

            <div class="control-group">
                <label>Auto Exposure (AEC) <span id="val_aec" class="val-display">On</span></label>
                <select id="aec" onchange="document.getElementById('val_aec').innerText = this.options[this.selectedIndex].text; updateCam('aec', this.value)">
                    <option value="0">Off</option>
                    <option value="1" selected>On</option>
                </select>
            </div>

        </div>
    </div>

    <script>
        // Send hardware adjustments to the ESP32 (Port 80)
        function updateCam(variable, value) {
            // Random timestamp prevents the browser from caching the command
            const url = `http://192.168.50.152/control?var=${variable}&val=${value}&_t=${new Date().getTime()}`;
            
            fetch(url, { mode: 'no-cors' })
                .then(() => {
                    const status = document.getElementById('status-indicator');
                    status.innerText = "Updated!";
                    status.style.color = "#4CAF50"; 
                    setTimeout(() => { 
                        status.innerText = "Live"; 
                        status.style.color = "#888"; 
                    }, 1000);
                })
                .catch(error => console.error('Error:', error));
        }

        // Send firmware binary to the ESP32 (Port 80)
        function pushOTA() {
            const fileInput = document.getElementById('otafile');
            if(fileInput.files.length === 0) { alert("Select a .bin file first!"); return; }
            
            const btn = document.getElementById('otaBtn');
            const progress = document.getElementById('ota-progress');
            
            btn.disabled = true;
            btn.innerText = "Flashing...";
            progress.style.display = "block";
            progress.innerText = "Uploading... Please wait.";
            progress.style.color = "#aaa";

            fetch('http://192.168.50.152/update', {
                method: 'POST',
                body: fileInput.files[0],
                mode: 'no-cors'
            })
            .then(() => {
                progress.innerText = "Success! Camera is rebooting...";
                progress.style.color = "#4CAF50";
                setTimeout(() => { window.location.reload(); }, 6000);
            })
            .catch(error => {
                progress.innerText = "OTA Failed.";
                progress.style.color = "red";
                btn.disabled = false;
                btn.innerText = "Push Firmware";
            });
        }
    </script>
</body>
</html>
